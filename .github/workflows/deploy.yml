name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"

            cd ~/G-CHAT-

            # Pull latest code
            git pull origin main

            # Remove client folder — VM only needs server
            rm -rf ~/G-CHAT-/client

            # Write .env from GitHub Secret
            cat > ~/G-CHAT-/server/.env << 'ENVEOF'
            ${{ secrets.SERVER_ENV }}
            ENVEOF

            # Run DB migrations (safe no-op if columns already exist)
            cd ~/G-CHAT-/server
            uv run python -m app.migrations.chat_memory_upgrade

            # Restart backend service
            sudo systemctl restart gchat

            # Wait for uvicorn to fully start, then verify
            for i in $(seq 1 10); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health)
              if [ "$STATUS" = "200" ]; then
                echo " Backend OK"
                exit 0
              fi
              echo "Waiting... attempt $i (status: $STATUS)"
            done
            echo "Backend did not become healthy" && exit 1
